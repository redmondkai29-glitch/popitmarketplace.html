<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop It Trading Marketplace</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0c10;
            color: #fff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 550px;
            margin: 30px auto;
            background: #1f2833;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 8px 30px rgba(0,0,0,0.7);
            border: 1px solid #66fcf1;
        }
        h1 { color: #66fcf1; margin-bottom: 5px; font-size: 28px; }
        p.subtitle { color: #c5a059; font-size: 14px; margin-top: 0; font-weight: bold; }
        .form-group {
            margin: 25px 0;
            text-align: left;
        }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #66fcf1; font-size: 14px; text-transform: uppercase;}
        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            border: 1px solid #45f3ff;
            background: #0b0c10;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .price-box {
            background: #0b0c10;
            padding: 20px;
            border-radius: 6px;
            margin: 25px 0;
            border-left: 5px solid #c5a059;
            text-align: left;
        }
        .price-box h3 { margin: 0; color: #66fcf1; font-size: 14px; text-transform: uppercase; }
        .price-box p { margin: 8px 0 0 0; font-size: 26px; font-weight: bold; color: #fff; }
        .deal-badge {
            display: inline-block;
            background: #25d366;
            color: #000;
            font-size: 12px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            margin-top: 5px;
            display: none;
        }
        .btn {
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-paypal { background: #00457c; border: 1px solid #0079c1; }
        .btn-paypal:hover { background: #0079c1; }
        .btn-discord { background: #5865F2; }
        .btn-discord:hover { background: #4752C4; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pop It Trading Shop</h1>
    <p class="subtitle">Instant Valuation & Secure Checkout</p>

    <div class="form-group">
        <label for="item-name">Enter Item Name:</label>
        <input type="text" id="item-name" placeholder="e.g., Sparkly Boo, Real Sugar, Rainbow Banana" value="Sparkly Boo" oninput="calculatePrice()">
    </div>

    <div class="form-group">
        <label for="quantity">Quantity (Value Tier):</label>
        <input type="number" id="quantity" value="1000" min="1" step="100" oninput="calculatePrice()">
    </div>

    <div class="price-box">
        <h3>Calculated Value:</h3>
        <p id="total-display">100 Robux (~€1.25)</p>
        <div id="deal-status" class="deal-badge">🔥 BULK DEAL APPLIED!</div>
    </div>

    <button class="btn btn-paypal" onclick="payWithPayPal()">💳 Pay with PayPal</button>

    <button class="btn btn-discord" onclick="orderViaDiscord()">💬 Submit Order & DM on Discord</button>
</div>

<script>
    // Global variables to hold data for checkout
    let finalRobux = 100;
    let finalCash = 1.25;

    function calculatePrice() {
        const qty = parseInt(document.getElementById('quantity').value) || 0;
        const dealStatus = document.getElementById('deal-status');
        
        let robuxValue = 0;

        // Custom Pricing Logic based on your rules:
        // 1k Sparkly Boo = 100 Robux base rate (0.1 Robux per item)
        // 10k Sparkly Boo = 600 Robux bulk rate (0.06 Robux per item)
        if (qty >= 10000) {
            // Apply the heavy bulk discount rate for 10k items and up
            robuxValue = Math.floor(qty * 0.06);
            dealStatus.style.display = 'inline-block';
            dealStatus.innerText = "🔥 MASSIVE DEAL APPLIED!";
        } else if (qty >= 5000) {
            // Mid-tier discount
            robuxValue = Math.floor(qty * 0.08);
            dealStatus.style.display = 'inline-block';
            dealStatus.innerText = "🔥 20% BULK DISCOUNT DEAL!";
        } else {
            // Standard rate (1,000 items = 100 Robux)
            robuxValue = Math.floor(qty * 0.1);
            dealStatus.style.display = 'none';
        }

        // Standard developer exchange rate to convert Robux into real Euros cash (€0.0125 per Robux)
        let cashPrice = (robuxValue * 0.0125).toFixed(2);

        // Update global tracking variables
        finalRobux = robuxValue;
        finalCash = cashPrice;

        // Display it nicely to the buyer
        document.getElementById('total-display').innerText = `${robuxValue.toLocaleString()} Robux (~€${cashPrice})`;
    }

    function payWithPayPal() {
        const itemName = document.getElementById('item-name').value || "Pop It Items";
        const qty = document.getElementById('quantity').value;
        
        alert(`Redirecting to PayPal to complete your €${finalCash} payment...`);
        
        // REPLACE THIS WITH YOUR PAYPAL.ME LINK:
        // Example: https://paypal.me/YOURUSERNAME/1.25EUR
        window.open(`https://paypal.me`, '_blank');
    }

    function orderViaDiscord() {
        const itemName = document.getElementById('item-name').value || "Unspecified Item";
        const qty = document.getElementById('quantity').value;

        // Build a professional order ticket for Discord
        const message = `🚨 NEW POP IT MARKETPLACE ORDER 🚨\n📦 Item: ${itemName}\n🔢 Total Quantity: ${parseInt(qty).toLocaleString()}\n💎 Valuation: ${finalRobux} Robux Value\n💶 Total Cost: €${finalCash}\n\nI am messaging to finalize delivery details!`;

        // Copy order info to clipboard
        navigator.clipboard.writeText(message);
        alert("📋 Order details copied to clipboard! Paste this directly to me in Discord.");

        // REPLACE THIS WITH YOUR DIRECT DISCORD PROFILE OR SERVER LINK
        window.open('https://discord.com', '_blank'); 
    }
    
    // Run once on load to establish baseline pricing
    calculatePrice();
</script>

</body>
</html>
