<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop It Trading Marketplace</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #fff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #16162a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.5);
            border: 2px solid #e94560;
        }
        h1 { color: #e94560; margin-bottom: 5px; }
        p.subtitle { color: #848ccf; font-size: 14px; margin-top: 0; }
        .form-group {
            margin: 20px 0;
            text-align: left;
        }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #4ecc71;}
        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #4ecc71;
            background: #0f0f1e;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        .price-box {
            background: #0f0f1e;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 5px solid #e94560;
            text-align: left;
        }
        .price-box h3 { margin: 0; color: #848ccf; font-size: 16px; }
        .price-box p { margin: 5px 0 0 0; font-size: 24px; font-weight: bold; color: #e94560; }
        .btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .btn:hover { background: #ff5e7e; }
        .btn-discord { background: #7289da; }
        .btn-discord:hover { background: #5b73c7; }
        .payment-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed #333;
        }
        .payment-methods img { width: 50px; margin: 5px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h1>Pop It Trading Marketplace</h1>
    <p class="subtitle">Select your items, generate AI pricing, and trade instantly!</p>

    <div class="form-group">
        <label for="popit-type">Choose Pop It Item:</label>
        <select id="popit-type" onchange="calculatePrice()">
            <option value="rainbow-amongus" data-base="3.50">🌈 Rainbow Among Us (Common)</option>
            <option value="glow-unicorn" data-base="5.00">✨ Glow-in-the-Dark Unicorn (Rare)</option>
            <option value="mega-square" data-base="8.50">📦 Mega 100-Bubble Square (Epic)</option>
            <option value="glitter-icecream" data-base="6.00">🍦 Glitter Ice Cream Cone (Rare)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" value="1" min="1" max="50" oninput="calculatePrice()">
    </div>

    <div class="price-box">
        <h3>🤖 AI Generated Dynamic Price:</h3>
        <p id="total-display">€3.50</p>
    </div>

    <button class="btn btn-discord" onclick="orderViaDiscord()">💬 Order via Discord</button>

    <div class="payment-section">
        <label>Accepted Real Money Payment Methods:</label>
        <p style="font-size: 13px; color:#aaa; margin-bottom: 15px;">Pay securely via Stripe / PayPal links inside our Discord dm!</p>
        <button class="btn" onclick="window.open('https://stripe.com', '_blank')">💳 Pay with Real Money</button>
    </div>
</div>

<script>
    // Simple algorithm acting as the "AI pricing generator" 
    function calculatePrice() {
        const itemSelect = document.getElementById('popit-type');
        const selectedOption = itemSelect.options[itemSelect.selectedIndex];
        const basePrice = parseFloat(selectedOption.getAttribute('data-base'));
        const quantity = parseInt(document.getElementById('quantity').value) || 1;

        // "AI" Bulk Discount Modifier: More items = slightly cheaper price per unit!
        let discount = 1.0;
        if (quantity >= 10) discount = 0.85; // 15% off for bulk buying
        else if (quantity >= 5) discount = 0.90; // 10% off

        let finalPrice = (basePrice * quantity * discount).toFixed(2);
        document.getElementById('total-display').innerText = '€' + finalPrice;
    }

    function orderViaDiscord() {
        const itemSelect = document.getElementById('popit-type');
        const itemName = itemSelect.options[itemSelect.selectedIndex].text;
        const quantity = document.getElementById('quantity').value;
        const price = document.getElementById('total-display').innerText;

        // Crafting the perfect message for Discord
        const message = `👋 Hey! I want to order from the Pop It Marketplace:\n📦 Item: ${itemName}\n🔢 Quantity: ${quantity}\n💰 AI Total Price: ${price}\nPlease send me the real money checkout details!`;

        // Copies the text automatically so they can just paste it to you
        navigator.clipboard.writeText(message);
        alert("🛒 Order text copied to clipboard! Paste it directly in Discord.");

        // CHANGE THIS URL to your own Discord Profile Link or Server Invite Link!
        window.open('https://discord.com', '_blank'); 
    }
</script>

</body>
</html>
